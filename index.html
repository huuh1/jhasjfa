<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pemesanan Mie Gacoan</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: linear-gradient(120deg,#ffeaa7,#fab1a0);
}
header {
    background-color: #d63031;
    color: white;
    text-align: center;
    padding: 25px 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
h1, h2 {
    margin: 0 0 10px 0;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}
main {
    max-width: 1000px;
    margin: 20px auto;
    padding: 0 15px;
}
input#buyerName {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: none;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}
.menu-container {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
    gap: 20px;
    margin-bottom: 30px;
}
.menu-item {
    background: #fff5ee;
    border-radius: 15px;
    padding: 10px;
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
}
.menu-item:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 20px rgba(0,0,0,0.3);
}
.menu-item img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 8px;
}
.menu-item h3 {
    margin: 8px 0 5px 0;
    font-size: 18px;
    color: #2d3436;
}
.badge {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    font-size: 13px;
    margin-bottom: 5px;
}
input[type="number"] {
    width: 60px;
    padding: 5px;
    margin-top: 5px;
    margin-bottom: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}
button {
    padding: 8px 16px;
    background-color: #d63031;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-weight: bold;
    margin-top: 5px;
}
button:hover {
    background-color: #e17055;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    background-color: #fff5ee;
}
th, td {
    padding: 12px;
    text-align: left;
}
th {
    background-color: #d63031;
    color: white;
}
tr:nth-child(even) {
    background-color: #ffe6e6;
}
.action-btn {
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    color: white;
    margin-right: 5px;
}
.edit-btn { background-color: #0984e3; }
.edit-btn:hover { background-color: #74b9ff; }
.delete-btn { background-color: #e74c3c; }
.delete-btn:hover { background-color: #ff7675; }
.text-right { text-align: right; }
.receipt {
    display: none;
    background-color: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    margin-top: 30px;
}
.receipt img {
    width: 50px;
    height: 50px;
    object-fit: cover;
    vertical-align: middle;
    margin-right: 8px;
    border-radius: 8px;
}
</style>
</head>
<body>
<header>
    <h1>Pemesanan Mie Gacoan</h1>
</header>
<main>
<input type="text" id="buyerName" placeholder="Masukkan nama pembeli">

<h2>Menu Mie</h2>
<div class="menu-container" id="mieMenu"></div>

<h2>Minuman</h2>
<div class="menu-container" id="drinkMenu"></div>

<h2>Daftar Pesanan</h2>
<table>
<thead>
<tr>
<th>Nama</th>
<th>Level</th>
<th>Harga</th>
<th>Jumlah</th>
<th>Subtotal</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="orderList"></tbody>
</table>
<div class="text-right total">
Total: Rp <span id="totalAmount">0</span>
</div>
<div class="text-right">
<button onclick="printReceipt()">Cetak Struk</button>
</div>

<div class="receipt" id="receipt"></div>

<script>
// Data menu Mie dan minuman
const mieItems = [];
for(let i=1;i<=8;i++){
    mieItems.push({
        id:i,
        name:`Mie Gacoan`,
        level:i,
        price:20000 + (i-1)*2000,
        image:`https://i.ibb.co/mXRg0yJ/mie${i}.jpg`
    });
}
const drinks = [
    { id:101,name:'Es Teh',price:5000,image:'https://i.ibb.co/Bt8rhtR/esteh.jpg' },
    { id:102,name:'Es Jeruk',price:7000,image:'https://i.ibb.co/YZjFZy5/esjeruk.jpg' },
    { id:103,name:'Air Mineral',price:3000,image:'https://i.ibb.co/jv9Rm7S/airmineral.jpg' },
    { id:104,name:'Es Kopi',price:10000,image:'https://i.ibb.co/N29yhtS/eskopi.jpg' },
    { id:105,name:'Susu Coklat',price:12000,image:'https://i.ibb.co/NxY8Jxr/susucoklat.jpg' }
];

// Ambil dari localStorage
let orders = JSON.parse(localStorage.getItem('orders')) || [];

// Render menu
function renderMenu(menuArray, containerId, isMie=false){
    const container = document.getElementById(containerId);
    container.innerHTML='';
    menuArray.forEach(item=>{
        const badgeColor = isMie ? `rgb(${50+item.level*25},0,0)` : '';
        const div=document.createElement('div');
        div.className='menu-item';
        div.innerHTML=`
            <img src="${item.image}" alt="${item.name}">
            <h3>${isMie ? '🍜 ' : '🥤 '}${item.name}</h3>
            ${isMie? `<span class="badge" style="background-color:${badgeColor}">Level ${item.level}</span>` : ''}
            <p>Rp ${item.price.toLocaleString()}</p>
            <input type="number" min="1" value="1" id="qty-${item.id}">
            <button onclick="addOrder(${item.id},'${containerId}')">Tambah</button>
        `;
        container.appendChild(div);
    });
}

renderMenu(mieItems,'mieMenu',true);
renderMenu(drinks,'drinkMenu');

// Tambah order
function addOrder(id,type){
    const buyerName = document.getElementById('buyerName').value.trim();
    if(!buyerName){ alert('Masukkan nama pembeli!'); return; }

    const itemArray = type==='mieMenu'? mieItems : drinks;
    const item = itemArray.find(i=>i.id===id);
    const qty = parseInt(document.getElementById(`qty-${id}`).value) || 1;
    const level = type==='mieMenu'? item.level : null;

    const existIndex = orders.findIndex(o=>o.id===id && o.level===level);
    if(existIndex>=0){
        orders[existIndex].qty += qty;
        orders[existIndex].subtotal = orders[existIndex].qty * orders[existIndex].price;
    } else {
        orders.push({ ...item, qty, subtotal: qty*item.price, level, buyerName });
    }
    localStorage.setItem('orders',JSON.stringify(orders));
    renderOrders();
}

// Render daftar pesanan
function renderOrders(){
    const tbody = document.getElementById('orderList');
    tbody.innerHTML='';
    let total=0;
    orders.forEach((o,index)=>{
        total+=o.subtotal;
        const tr=document.createElement('tr');
        tr.innerHTML=`
            <td>${o.level ? '🍜 ' : '🥤 '}${o.name}</td>
            <td>${o.level? o.level : '-'}</td>
            <td>Rp ${o.price.toLocaleString()}</td>
            <td>${o.qty}</td>
            <td>Rp ${o.subtotal.toLocaleString()}</td>
            <td>
                <button class="action-btn edit-btn" onclick="editOrder(${index})"><i class="fas fa-edit"></i></button>
                <button class="action-btn delete-btn" onclick="deleteOrder(${index})"><i class="fas fa-trash"></i></button>
            </td>
        `;
        tbody.appendChild(tr);
    });
    document.getElementById('totalAmount').textContent=total.toLocaleString();
}

// Edit dan hapus
function editOrder(index){
    const newQty = prompt('Ubah jumlah:', orders[index].qty);
    const qty = parseInt(newQty);
    if(qty>0){
        orders[index].qty = qty;
        orders[index].subtotal = qty*orders[index].price;
        localStorage.setItem('orders',JSON.stringify(orders));
        renderOrders();
    }
}

function deleteOrder(index){
    if(confirm('Hapus item ini?')){
        orders.splice(index,1);
        localStorage.setItem('orders',JSON.stringify(orders));
        renderOrders();
    }
}

// Cetak struk
function printReceipt(){
    if(orders.length===0){ alert('Pesanan kosong!'); return; }
    const buyerName = document.getElementById('buyerName').value.trim() || 'Tidak diketahui';
    let receiptContent = `<h2>Struk Pesanan Mie Gacoan</h2><p>Pembeli: ${buyerName}</p><hr>`;
    let total = 0;
    orders.forEach(o=>{
        receiptContent += `<div>${o.level ? '🍜 ' : '🥤 '}<img src="${o.image}" alt="${o.name}"> ${o.name}${o.level? ' (Level '+o.level+')':''} x ${o.qty} = Rp ${o.subtotal.toLocaleString()}</div>`;
        total += o.subtotal;
    });
    receiptContent += `<hr><h3>Total: Rp ${total.toLocaleString()}</h3>`;
    const receiptWindow = window.open('','_blank','width=400,height=600');
    receiptWindow.document.write(`<html><head><title>Struk</title></head><body>${receiptContent}</body></html>`);
    receiptWindow.document.close();
    receiptWindow.print();
}

renderOrders();
</script>
</body>
</html>
